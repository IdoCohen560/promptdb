<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PromptDB — ask your database in English</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 ui-sans-serif, system-ui, sans-serif;
         background: #0b0e14; color: #e6e6e6; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: #8a93a6; margin: 0 0 24px; }
  form { display: flex; gap: 8px; }
  input { flex: 1; padding: 12px 14px; border-radius: 8px; border: 1px solid #2a3142;
          background: #131825; color: #e6e6e6; font-size: 15px; }
  button { padding: 12px 18px; border-radius: 8px; border: 0; background: #4f7cff;
           color: #fff; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .steps { margin: 20px 0; min-height: 22px; color: #8a93a6; font-size: 13px; }
  .step { display: inline-block; margin-right: 6px; }
  .step.done { color: #5ad16f; }
  pre { background: #131825; border: 1px solid #2a3142; border-radius: 8px;
        padding: 12px 14px; overflow-x: auto; color: #8fd3ff; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
  th, td { border: 1px solid #2a3142; padding: 6px 10px; text-align: left; }
  th { background: #131825; }
  .answer { margin-top: 18px; font-size: 17px; color: #fff; }
  .footer { margin-top: 8px; color: #8a93a6; font-size: 12px; }
  .err { color: #ff6b6b; }
  .examples { margin-top: 14px; font-size: 13px; color: #8a93a6; }
  .examples a { color: #4f7cff; text-decoration: none; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <h1>PromptDB</h1>
  <p class="sub">Ask your database in English. It writes SQL, runs it read-only, and explains the answer.</p>
  <form id="f">
    <input id="q" placeholder="Which 5 artists earned the most revenue?" autocomplete="off" />
    <button id="go" type="submit">Ask</button>
  </form>
  <div class="examples">Try:
    <a data-q="Which 5 artists earned the most revenue?">top artists by revenue</a> ·
    <a data-q="Which countries have more than 5 customers?">countries with 5+ customers</a> ·
    <a data-q="What are the top 3 genres by number of tracks?">top genres</a>
  </div>
  <div class="steps" id="steps"></div>
  <div id="sqlbox"></div>
  <div id="result"></div>
  <div class="answer" id="answer"></div>
  <div class="footer" id="footer"></div>
</div>
<script>
const f = document.getElementById('f'), q = document.getElementById('q'),
      go = document.getElementById('go'), steps = document.getElementById('steps'),
      sqlbox = document.getElementById('sqlbox'), result = document.getElementById('result'),
      answer = document.getElementById('answer'), footer = document.getElementById('footer');
let t0 = 0;

document.querySelectorAll('.examples a').forEach(a =>
  a.onclick = () => { q.value = a.dataset.q; f.requestSubmit(); });

function reset() { steps.innerHTML = ''; sqlbox.innerHTML = ''; result.innerHTML = '';
                   answer.textContent = ''; footer.textContent = ''; }

function renderTable(cols, rows) {
  if (!cols) return;
  let h = '<table><thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
  h += rows.slice(0, 20).map(r => '<tr>' + r.map(v => `<td>${v}</td>`).join('') + '</tr>').join('');
  result.innerHTML = h + '</tbody></table>';
}

f.onsubmit = (e) => {
  e.preventDefault();
  if (!q.value.trim()) return;
  reset(); go.disabled = true; t0 = performance.now();
  const es = new EventSource('/query/stream?q=' + encodeURIComponent(q.value));
  es.onmessage = (ev) => {
    const d = JSON.parse(ev.data);
    if (d.node === 'done') {
      const secs = ((performance.now() - t0) / 1000).toFixed(1);
      footer.textContent = `· ${secs}s` + (window._cost ? ` · $${window._cost.toFixed(5)}` : '');
      es.close(); go.disabled = false; return;
    }
    const s = document.createElement('span');
    s.className = 'step'; s.textContent = d.node + ' →'; steps.appendChild(s);
    if (d.sql) sqlbox.innerHTML = '<pre>' + d.sql + '</pre>';
    if (d.columns) renderTable(d.columns, d.rows || []);
    if (d.cost_usd) window._cost = d.cost_usd;
    if (d.answer) answer.textContent = d.answer;
    if (d.error) { answer.innerHTML = '<span class="err">' + d.error + '</span>'; }
  };
  es.onerror = () => { es.close(); go.disabled = false; };
};
</script>
</body>
</html>
